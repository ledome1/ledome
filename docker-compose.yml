services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    volumes:
      - ./data:/app/data
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: constructflow
      POSTGRES_USER: constructflow
      POSTGRES_PASSWORD: constructflow_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: constructflow
      MINIO_ROOT_PASSWORD: constructflow_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
volumes:
  pgdata:
  miniodata:
