<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#087f78">
    <title>LE DOME - Chấm công vị trí</title>
    <link rel="stylesheet" href="/attendance/mobile.css?v=4">
  </head>
  <body>
    <main>
      <header class="mobile-head">
        <img class="mobile-logo" src="/assets/ledome-logo-light.png" alt="LE DOME">
        <small>Chấm công vị trí</small>
      </header>
      <section class="attendance-card">
        <div class="clock"><b id="clock">--:--</b><span id="today"></span></div>
        <label>Nhân sự<input id="employee-name" class="locked-input" readonly><input id="employee" type="hidden"></label>
        <label>Vị trí<select id="site"></select></label>
        <section class="gps-panel">
          <div><b>⌖ Vị trí GPS</b><span id="gps-status">Đang tự động định vị...</span></div>
          <p id="gps-detail"></p>
          <div class="gps-map-frame" id="gps-map-frame">
            <iframe id="gps-map" title="Vị trí GPS trên Google Maps" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            <span id="gps-map-placeholder">Đang xác định vị trí trên Google Maps...</span>
          </div>
          <a class="gps-map-link" id="gps-map-link" href="https://maps.google.com" target="_blank" rel="noopener">Mở Google Maps</a>
        </section>
        <label class="photo-field">Ảnh xác thực tại vị trí
          <input id="photo" type="file" accept="image/*" capture="user">
          <span id="photo-label">Camera sẽ tự mở - bấm để chụp lại</span>
        </label>
        <img id="photo-preview" alt="Ảnh xác thực">
        <div class="attendance-actions">
          <button data-type="check-in">Check-in</button>
          <button data-type="check-out">Check-out</button>
        </div>
        <p class="notice" id="notice">Bật GPS chính xác trên điện thoại trước khi chấm công.</p>
      </section>
      <section class="history-card">
        <h2>Lịch sử gần đây</h2>
        <div id="history"></div>
      </section>
    </main>
    <script src="/attendance/mobile.js?v=12"></script>
  </body>
</html>
